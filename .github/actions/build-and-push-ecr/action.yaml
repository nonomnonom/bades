name: Build and Push to ECR

description: >
  Builds Bades Docker image (all-in-one) and pushes to Amazon ECR.
  Used by both staging and production deploy workflows.

inputs:
  environment:
    description: 'Target environment — staging or production'
    required: true
    type: string
  ecr-repository-uri:
    description: 'Full ECR repository URI (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/bades-staging)'
    required: true
  dockerfile-path:
    description: 'Path to the Dockerfile relative to repo root'
    required: false
    default: 'packages/docker/bades/Dockerfile'
  docker-build-target:
    description: 'Docker build target to use (e.g. bades-app, bades, bades-server)'
    required: false
    default: 'bades-app'
  app-version:
    description: 'Docker image tag / APP_VERSION build arg'
    required: true

outputs:
  ecr-image-uri:
    description: 'Full URI of the pushed image (includes tag)'
    value: ${{ steps.push.outputs.ecr-image-uri }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
      with:
        images: ${{ inputs.ecr-repository-uri }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}},prefix=${{ inputs.environment }}-
          type=semver,pattern={{major}}.{{minor}}.{{patch}}
          type=raw,value=${{ inputs.app-version }},enable=${{ inputs.app-version != '' }}

    - name: Build and push to ECR
      id: push
      uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        target: ${{ inputs.docker-build-target }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          APP_VERSION=${{ inputs.app-version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Echo pushed image URI
      shell: bash
      run: |
        echo "image=${{ steps.push.outputs.ecr-image-uri }}"
        echo "ecr-image-uri=${{ steps.push.outputs.ecr-image-uri }}" >> "$GITHUB_OUTPUT"