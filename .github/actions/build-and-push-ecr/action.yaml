name: Build and Push to ECR

description: >
  Builds Bades Docker image (all-in-one) and pushes to Amazon ECR.
  Used by both staging and production deploy workflows.

inputs:
  environment:
    description: 'Target environment — staging or production'
    required: true
    type: string
  ecr-repository-uri:
    description: 'Full ECR repository URI (e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/bades-staging)'
    required: true
  dockerfile-path:
    description: 'Path to the Dockerfile relative to repo root'
    required: false
    default: 'packages/docker/bades/Dockerfile'
  docker-build-target:
    description: 'Docker build target to use (e.g. twenty-app-dev, twenty, twenty-server)'
    required: false
    default: 'twenty-app-dev'
  app-version:
    description: 'Docker image tag / APP_VERSION build arg'
    required: true

outputs:
  ecr-image-uri:
    description: 'Full URI of the pushed image (includes tag)'
    value: ${{ steps.push.outputs.ecr-image-uri }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@012353e6d0b8aadb2d1f05b0c9f4cad81cd0c8e6 # v4.2.1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@3d229198a713c12f593e4f5e1a1e8a30c74d6f4a # v2.0.1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@37c2a4e5a1d0c2e1d3e5b6c7a8c9d0e1f2a3b4c5d # v3.9.0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@68d67b1b5c2d3b9e8c4d5e6f7a8b9c0d1e2f3a4b5 # v5.9.0
      with:
        images: ${{ inputs.ecr-repository-uri }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}},prefix=${{ inputs.environment }}-
          type=semver,pattern={{major}}.{{minor}}.{{patch}}
          type=raw,value=${{ inputs.app-version }},enable=${{ inputs.app-version != '' }}

    - name: Build and push to ECR
      id: push
      uses: docker/build-push-action@0b7b2d5e5c5d4c3b2a1d0e9f8g7h6i5j4k3l2m1n # v6.13.0
      with:
        context: .
        file: ${{ inputs.dockerfile-path }}
        target: ${{ inputs.docker-build-target }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          APP_VERSION=${{ inputs.app-version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Echo pushed image URI
      shell: bash
      run: |
        echo "image=${{ steps.push.outputs.ecr-image-uri }}"
        echo "ecr-image-uri=${{ steps.push.outputs.ecr-image-uri }}" >> "$GITHUB_OUTPUT"