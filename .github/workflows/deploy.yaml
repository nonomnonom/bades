name: Deploy to AWS App Runner

# ─────────────────────────────────────────────────────────────────────────────
# STAGING  — push ke branch `staging` atau merge ke `main` (selalu latest)
# ─────────────────────────────────────────────────────────────────────────────
#─────────────────────────────────────────────────────────────────────────────
# - push ke `staging` / `main`  → staging deploy
# - push tag `v*.*.*`           → production deploy
# - workflow_dispatch manual    → pilih environment
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - staging
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOCKERFILE_PATH: packages/docker/bades/Dockerfile
  # Target produksi: server + frontend + aws-cli (DB & Redis di luar container)
  DOCKER_TARGET: bades-aws

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # STAGING
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    env:
      ENVIRONMENT: staging
      ECR_REPOSITORY_URI: ${{ secrets.AWS_ECR_STAGING_REPOSITORY_URI }}
      APP_RUNNER_SERVICE_ARN: ${{ secrets.AWS_APPRUNNER_STAGING_SERVICE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      IMAGE_TAG: staging-${{ github.sha }}

    steps:
      - name: Build and push to ECR
        uses: ./.github/actions/build-and-push-ecr
        with:
          environment: staging
          ecr-repository-uri: ${{ env.ECR_REPOSITORY_URI }}
          dockerfile-path: ${{ env.DOCKERFILE_PATH }}
          docker-build-target: ${{ env.DOCKER_TARGET }}
          app-version: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to App Runner (staging)
        shell: bash
        run: |
          echo "Updating App Runner service..."
          aws apprunner update-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --image-uri "${{ env.ECR_REPOSITORY_URI }}:${{ env.IMAGE_TAG }}" \
            --region "${{ env.AWS_REGION }}" \
            --operational-state "RUNNING" \
            --output json

          echo "Waiting for deployment to complete..."
          aws apprunner wait service-updated \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --region "${{ env.AWS_REGION }}"

          SERVICE=$(aws apprunner describe-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "✅ Staging deployed at: https://$SERVICE"

      - name: Notify deployment
        if: always()
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Staging deployment completed successfully"
          else
            echo "❌ Staging deployment failed"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # PRODUCTION — dipicu oleh tag v*.*.* atau workflow_dispatch production
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write   # untuk membuat GitHub Release saat tag v*.*.*
    env:
      ENVIRONMENT: production
      ECR_REPOSITORY_URI: ${{ secrets.AWS_ECR_PRODUCTION_REPOSITORY_URI }}
      APP_RUNNER_SERVICE_ARN: ${{ secrets.AWS_APPRUNNER_PRODUCTION_SERVICE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Compute image tag
        id: tag
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # refs/tags/v1.2.3 -> v1.2.3, fallback ke SHA pendek untuk dispatch manual
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="manual-${GITHUB_SHA::12}"
          fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push to ECR
        uses: ./.github/actions/build-and-push-ecr
        with:
          environment: production
          ecr-repository-uri: ${{ env.ECR_REPOSITORY_URI }}
          dockerfile-path: ${{ env.DOCKERFILE_PATH }}
          docker-build-target: ${{ env.DOCKER_TARGET }}
          app-version: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to App Runner (production)
        shell: bash
        run: |
          echo "Updating App Runner service..."
          aws apprunner update-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --image-uri "${{ env.ECR_REPOSITORY_URI }}:${{ env.IMAGE_TAG }}" \
            --region "${{ env.AWS_REGION }}" \
            --operational-state "RUNNING" \
            --output json

          echo "Waiting for deployment to complete..."
          aws apprunner wait service-updated \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --region "${{ env.AWS_REGION }}"

          SERVICE=$(aws apprunner describe-service \
            --service-arn "${{ env.APP_RUNNER_SERVICE_ARN }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Service.ServiceUrl' \
            --output text)

          echo "✅ Production deployed at: https://$SERVICE"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048 # v2.2.0
        with:
          generate_release_notes: true
          files: |
            packages/docker/bades/Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
