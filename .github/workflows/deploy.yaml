  #           -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
  #           -H "Content-Type: application/json" \
  #           -d '{"environment": "production", "ref": "${{ github.ref_name }}"}'

  # Optional: Notify Render of new deployment
