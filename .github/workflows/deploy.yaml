name: Deploy

# Deploy to production when a version tag is pushed.
# This workflow builds Docker images and can notify deployment platforms.
# For Railway/Render automatic deploys, enable auto-deploy in their dashboard
# and this workflow will rebuild and push the image, triggering their deploy.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bades
  NODE_VERSION: '24'

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push bades (server + frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: bades
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push bades-server (API only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: bades-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}-server
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push bades-aws (full + AWS CLI)
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main'
        with:
          context: .
          file: Dockerfile
          target: bades-aws
          push: true
          tags: ${{ steps.meta.outputs.tags }}-aws
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Targets:** bades, bades-server, bades-aws" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${{ github.ref_name }}-server\`" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${{ github.ref_name }}-aws\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "\`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi

  # Optional: Notify Railway of new deployment
  # Uncomment and configure RAILWAY_TOKEN secret if using Railway
  # railway-deploy:
  #   name: Notify Railway
