name: Deploy to AWS ECS Fargate

# ─────────────────────────────────────────────────────────────────────────────
# Bades production deploy pipeline — ECS Fargate Jakarta (ap-southeast-3).
# - push ke branch `staging`        → staging service
# - push tag `v*.*.*`               → production service
# - workflow_dispatch manual        → pilih environment
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - staging
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-3
  DOCKERFILE_PATH: packages/docker/bades/Dockerfile
  DOCKER_TARGET: bades-aws
  ECR_REPOSITORY: bades

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # STAGING
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    env:
      ENVIRONMENT: staging
      IMAGE_TAG: staging-${{ github.sha }}
      TASK_DEFINITION_FAMILY: bades-staging-task
      TASK_DEFINITION_FILE: scripts/aws/bades-staging-task.json
      ECS_SERVICE: bades-staging-service
      ECS_CLUSTER: bades-cluster
      CONTAINER_NAME: bades
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build and push image to ECR
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          target: ${{ env.DOCKER_TARGET }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@acd72bc11233ac43bac45ddb7b8e54ada737e6cd # v1.7.4
        with:
          task-definition: ${{ env.TASK_DEFINITION_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@8230edfe842008418c5275908cae75e51d3befb2 # v2.3.0
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Healthcheck via ALB
        shell: bash
        env:
          ALB_DNS: ${{ secrets.AWS_ALB_DNS }}
        run: |
          if [ -z "${ALB_DNS:-}" ]; then
            echo "AWS_ALB_DNS secret kosong — skip healthcheck via ALB."
            exit 0
          fi
          echo "Healthcheck staging.bades.id via $ALB_DNS"
          for i in 1 2 3 4 5; do
            if curl -fsS -H "Host: staging.bades.id" "http://${ALB_DNS}/healthz" >/dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Attempt $i gagal, retry dalam 10 detik..."
            sleep 10
          done
          echo "Healthcheck gagal setelah 5 percobaan."
          exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # PRODUCTION
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write  # untuk GitHub Release saat tag v*.*.*
    env:
      ENVIRONMENT: production
      TASK_DEFINITION_FAMILY: bades-production-task
      TASK_DEFINITION_FILE: scripts/aws/bades-production-task.json
      ECS_SERVICE: bades-production-service
      ECS_CLUSTER: bades-cluster
      CONTAINER_NAME: bades
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute image tag
        id: tag
        shell: bash
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="manual-${GITHUB_SHA::12}"
          fi
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build and push image to ECR
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          target: ${{ env.DOCKER_TARGET }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          build-args: |
            APP_VERSION=${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Render ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@acd72bc11233ac43bac45ddb7b8e54ada737e6cd # v1.7.4
        with:
          task-definition: ${{ env.TASK_DEFINITION_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS production
        uses: aws-actions/amazon-ecs-deploy-task-definition@8230edfe842008418c5275908cae75e51d3befb2 # v2.3.0
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

      - name: Healthcheck via ALB
        shell: bash
        env:
          ALB_DNS: ${{ secrets.AWS_ALB_DNS }}
        run: |
          if [ -z "${ALB_DNS:-}" ]; then
            echo "AWS_ALB_DNS secret kosong — skip healthcheck via ALB."
            exit 0
          fi
          echo "Healthcheck app.bades.id via $ALB_DNS"
          for i in 1 2 3 4 5; do
            if curl -fsS -H "Host: app.bades.id" "http://${ALB_DNS}/healthz" >/dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Attempt $i gagal, retry dalam 10 detik..."
            sleep 10
          done
          echo "Healthcheck gagal setelah 5 percobaan."
          exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048 # v2.2.0
        with:
          generate_release_notes: true
          files: |
            packages/docker/bades/Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
