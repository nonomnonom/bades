name: Translate New Strings to Indonesian

on:
  push:
    branches:
      - main
    paths:
      - 'packages/front/src/**/*.ts'
      - 'packages/front/src/**/*.tsx'
  workflow_dispatch:

jobs:
  extract-and-translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Extract new t strings
        run: |
          yarn lingui extract

      - name: Check for new untranslated strings
        id: check_translations
        run: |
          cd packages/front

          # Check if id-ID.po has untranslated strings (msgstr is empty)
          untranslated=$(grep -c '^msgstr ""$' src/locales/id-ID.po 2>/dev/null || echo "0")
          echo "Untranslated strings: $untranslated"
          echo "untranslated_count=$untranslated" >> $GITHUB_OUTPUT

      - name: Create translation PR if needed
        if: steps.check_translations.outputs.untranslated_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: translate new strings to Indonesian"
          title: "Translate new strings to Indonesian"
          body: |
            ## Summary
            This PR translates newly added English strings to Indonesian.

            Please review and merge the translations.
          branch: chore/translate-to-indonesian
          base: main