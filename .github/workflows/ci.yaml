name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '24'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        uses: ./.github/actions/bun-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Nx menghitung urutan build via dependsOn `^build`; run-many memparalelkan
      # task yang independen (mis. front + emails) sekaligus.
      - name: Build all
        run: >-
          bunx nx run-many -t build
          -p shared emails ui sdk server front client-sdk front-component-renderer

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        uses: ./.github/actions/bun-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build oxlint plugin
        run: bunx nx build oxlint-rules

      - name: Lint + format check
        run: bunx nx run-many -t lint,fmt -p server front shared

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        uses: ./.github/actions/bun-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Typecheck
        run: bunx nx run-many -t typecheck -p server front shared

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LANG: id_ID.UTF-8
      LC_ALL: id_ID.UTF-8
      TZ: Asia/Jakarta
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Indonesian locale
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen id_ID.UTF-8
          sudo update-locale LANG=id_ID.UTF-8 LC_ALL=id_ID.UTF-8

      - name: Install dependencies
        uses: ./.github/actions/bun-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test server + front
        run: bunx nx run-many -t test -p server front

  integration-test:
    name: Integration tests (server)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
      clickhouse:
        image: clickhouse/clickhouse-server:25.8.8
        env:
          CLICKHOUSE_PASSWORD: clickhousePassword
          CLICKHOUSE_URL: 'http://default:clickhousePassword@localhost:8123/bades'
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --host=localhost --port=9000 --user=default --password=clickhousePassword --query='SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      ANALYTICS_ENABLED: 'true'
      CLICKHOUSE_URL: 'http://default:clickhousePassword@localhost:8123/bades'
      CLICKHOUSE_PASSWORD: clickhousePassword
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        uses: ./.github/actions/bun-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build server (+ deps)
        run: bunx nx build server

      - name: Prepare .env.test
        working-directory: packages/server
        run: |
          # Aktifkan billing flag + redirect link netral untuk integration test.
          # Tidak ada credential Stripe yang masih dipakai di test path.
          echo "" >> .env.test
          echo "IS_BILLING_ENABLED=true" >> .env.test
          echo "BILLING_PLAN_REQUIRED_LINK=http://localhost:3001/billing-redirection" >> .env.test

      - name: Create test database
        run: >-
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres
          -c 'CREATE DATABASE "test";'

      - name: Init schema + run migrations (test DB)
        working-directory: packages/server
        env:
          NODE_ENV: test
          PG_DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
        run: |
          # .env.test punya PG_DATABASE_URL=...test; copy ke .env supaya
          # subprocess Nx/Nest yang dispawn oleh `database:init` membaca DB yang
          # sama persis dengan integration test runtime.
          cp .env.test .env
          cd ../..
          bunx nx run server:database:init

      - name: ClickHouse migrate + seed
        run: |
          bunx nx clickhouse:migrate server
          bunx nx clickhouse:seed server

      - name: Run integration tests (with DB reset)
        env:
          NODE_ENV: test
          PG_DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
        run: bunx nx run server:test:integration:with-db-reset
