#
# Crowdin CLI configuration for App translations (front, server, emails)
# Project ID: 1
# See https://crowdin.github.io/crowdin-cli/configuration for more information
#

preserve_hierarchy: true
base_path: ..

files:
  #
  # Source files filter - PO files for Lingui
  #
  - source: packages/front/src/locales/en.po
    #
    # Translation files path
    #
    translation: '%original_path%/%locale%.po'
  - source: packages/server/src/engine/core-modules/i18n/locales/en.po
    translation: '%original_path%/%locale%.po'
  - source: packages/emails/src/locales/en.po
    translation: '%original_path%/%locale%.po'
