{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bades.fullname" . }}-worker
  namespace: {{ include "bades.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "bades.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bades.name" . }}
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bades.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
{{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ if .Values.db.enabled }}{{ include "bades.fullname" . }}-db{{ else }}{{ .Values.db.external.host }}{{ end }} \
                               -p {{ if .Values.db.enabled }}5432{{ else }}{{ .Values.db.external.port | default 5432 }}{{ end }} \
                               -U postgres; do
                echo "Waiting for database | default "bades"socket..."
                sleep 2
              done
              echo "Database socket is ready!"
      containers:
        - name: worker
          {{- $img := include "bades.worker.image" . }}
          image: {{ include "bades.image.repository" $img }}:{{ include "bades.image.tag" $img }}
          imagePullPolicy: {{ include "bades.image.pullPolicy" $img }}
          command:
{{- toYaml .Values.worker.command | nindent 12 }}
          env:
            - name: SERVER_URL
              value: {{ include "bades.serverUrl" . | quote }}
            {{- if eq (include "bades.db.useExternalSecret" .) "true" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bades.dbPassword.secretName" . }}
                  key: {{ include "bades.dbPassword.secretKey" . }}
            - name: PG_DATABASE_URL
              value: {{ include "bades.dbUrl.template" . | quote }}
            {{- else }}
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "bades.dbUrl.secretName" . }}
                  key: url
            {{- end }}
            {{- if eq (include "bades.redis.useExternalSecret" .) "true" }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.secretName }}
                  key: {{ .Values.redis.external.passwordKey }}
            {{- else if .Values.redis.external.password }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.external.password | quote }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "bades.redisUrl" . | quote }}
            - name: STORAGE_TYPE
              value: {{ include "bades.storageType" . | quote }}
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "bades.secret.tokens.name" . }}
                  key: accessToken
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- $storageEnv := (include "bades.storageEnv" .) }}
            {{- if $storageEnv }}
            {{- $storageEnv | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          stdin: {{ default true .Values.worker.stdin }}
          tty: {{ default true .Values.worker.tty }}
{{- end }}
